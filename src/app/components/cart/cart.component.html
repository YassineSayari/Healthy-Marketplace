<div class="pt-24 pb-20 min-h-screen">
  <div class="max-w-7xl mx-auto px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 animate-fadeInDown">Shopping Cart</h1>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Cart Items -->
      <div class="lg:w-2/3">
        <div *ngFor="let item of cartItems; let i = index" 
             class="bg-white rounded-lg shadow-md p-4 mb-4 animate-fadeInUp"
             [style.animation-delay]="i * 100 + 'ms'">
          <div class="flex items-center gap-4">
            <img [src]="item.image" [alt]="item.name" class="w-24 h-24 object-cover rounded-lg">
            
            <div class="flex-1">
              <h3 class="font-semibold text-lg">{{item.name}}</h3>
              <p class="text-gray-600">{{item.price}}</p>
              
              <div class="flex items-center mt-2">
                <button (click)="updateQuantity(item, -1)"
                        class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 
                               transition-colors duration-300">
                  <i class="fas fa-minus text-sm"></i>
                </button>
                <span class="mx-4 font-semibold">{{item.quantity}}</span>
                <button (click)="updateQuantity(item, 1)"
                        class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300 
                               transition-colors duration-300">
                  <i class="fas fa-plus text-sm"></i>
                </button>
              </div>
            </div>
            
            <div class="text-right">
              <p class="font-bold text-green-600 text-lg">${{(item.price * item.quantity).toFixed(2)}}</p>
              <button (click)="removeItem(item)"
                      class="text-red-500 hover:text-red-700 mt-2 transition-colors duration-300">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="lg:w-1/3">
        <div class="bg-white rounded-lg shadow-md p-6 sticky top-24 animate-fadeInRight">
          <h2 class="text-xl font-bold mb-4">Order Summary</h2>
          
          <div class="space-y-2 mb-4">
            <div class="flex justify-between">
              <span>Subtotal</span>
              <span>${{subtotal.toFixed(2)}}</span>
            </div>
            <div class="flex justify-between">
              <span>Shipping</span>
              <span>${{shipping.toFixed(2)}}</span>
            </div>
            <div class="flex justify-between">
              <span>Tax</span>
              <span>${{tax.toFixed(2)}}</span>
            </div>
            <div class="border-t pt-2 mt-2">
              <div class="flex justify-between font-bold text-lg">
                <span>Total</span>
                <span class="text-green-600">${{total.toFixed(2)}}</span>
              </div>
            </div>
          </div>

          <!-- Promo Code -->
          <div class="mb-4">
            <div class="flex gap-2">
              <input type="text" 
                     placeholder="Promo code"
                     class="flex-1 border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
              <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg 
                             hover:bg-gray-300 transition-colors duration-300">
                Apply
              </button>
            </div>
          </div>

          <button routerLink="/checkout"
                  class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold 
                         hover:bg-green-700 transform hover:scale-105 transition-all 
                         duration-300 shadow-lg hover:shadow-xl">
            Proceed to Checkout
          </button>
          
          <button routerLink="/shop"
                  class="w-full mt-2 text-green-600 py-2 hover:text-green-700 
                         transition-colors duration-300">
            Continue Shopping
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
