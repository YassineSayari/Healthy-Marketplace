<div class="pt-24 pb-20 min-h-screen bg-gray-50">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 animate-fadeInDown">Checkout</h1>

    <!-- Progress Steps -->
    <div class="flex justify-between mb-8">
      <div *ngFor="let step of steps; let i = index" 
           class="flex-1 text-center">
        <div class="relative">
          <div class="w-10 h-10 mx-auto rounded-full flex items-center justify-center
                      transition-all duration-300"
               [class.bg-green-600]="i <= currentStep"
               [class.bg-gray-300]="i > currentStep"
               [class.text-white]="i <= currentStep">
            <span>{{i + 1}}</span>
          </div>
          <div class="absolute top-5 left-1/2 w-full h-1 -z-10"
               [class.bg-green-600]="i < currentStep"
               [class.bg-gray-300]="i >= currentStep"></div>
        </div>
        <span class="text-sm mt-2 block">{{step}}</span>
      </div>
    </div>

    <!-- Checkout Form -->
    <div class="bg-white rounded-lg shadow-lg p-6 animate-fadeInUp">
      <form (ngSubmit)="onSubmit()" #checkoutForm="ngForm">
        <!-- Shipping Information -->
        <div *ngIf="currentStep === 0" class="space-y-4">
          <h2 class="text-xl font-semibold mb-4">Shipping Information</h2>
          
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 mb-2">First Name</label>
              <input type="text" 
                     ngModel name="firstName"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
            <div>
              <label class="block text-gray-700 mb-2">Last Name</label>
              <input type="text" 
                     ngModel name="lastName"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
          </div>

          <div>
            <label class="block text-gray-700 mb-2">Email</label>
            <input type="email" 
                   ngModel name="email"
                   required email
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                          focus:ring-2 focus:ring-green-500 transition-all">
          </div>

          <div>
            <label class="block text-gray-700 mb-2">Address</label>
            <input type="text" 
                   ngModel name="address"
                   required
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                          focus:ring-2 focus:ring-green-500 transition-all">
          </div>

          <div class="grid md:grid-cols-3 gap-4">
            <div>
              <label class="block text-gray-700 mb-2">City</label>
              <input type="text" 
                     ngModel name="city"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
            <div>
              <label class="block text-gray-700 mb-2">State</label>
              <input type="text" 
                     ngModel name="state"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
            <div>
              <label class="block text-gray-700 mb-2">ZIP Code</label>
              <input type="text" 
                     ngModel name="zip"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
          </div>
        </div>

        <!-- Payment Information -->
        <div *ngIf="currentStep === 1" class="space-y-4">
          <h2 class="text-xl font-semibold mb-4">Payment Information</h2>
          
          <div>
            <label class="block text-gray-700 mb-2">Card Number</label>
            <input type="text" 
                   ngModel name="cardNumber"
                   required
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                          focus:ring-2 focus:ring-green-500 transition-all">
          </div>

          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 mb-2">Expiry Date</label>
              <input type="text" 
                     ngModel name="expiry"
                     placeholder="MM/YY"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
            <div>
              <label class="block text-gray-700 mb-2">CVV</label>
              <input type="text" 
                     ngModel name="cvv"
                     required
                     class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                            focus:ring-2 focus:ring-green-500 transition-all">
            </div>
          </div>

          <div>
            <label class="block text-gray-700 mb-2">Name on Card</label>
            <input type="text" 
                   ngModel name="cardName"
                   required
                   class="w-full border rounded-lg px-4 py-2 focus:outline-none 
                          focus:ring-2 focus:ring-green-500 transition-all">
          </div>
        </div>

        <!-- Review Order -->
        <div *ngIf="currentStep === 2" class="space-y-4">
          <h2 class="text-xl font-semibold mb-4">Review Your Order</h2>
          
          <div class="border rounded-lg p-4">
            <h3 class="font-semibold mb-2">Shipping Address</h3>
            <p class="text-gray-600">John Doe<br>123 Main St<br>New York, NY 10001</p>
          </div>

          <div class="border rounded-lg p-4">
            <h3 class="font-semibold mb-2">Order Items</h3>
            <div *ngFor="let item of cartItems" class="flex justify-between mb-2">
              <span>{{item.name}} x {{item.quantity}}</span>
              <span>${{(item.price * item.quantity).toFixed(2)}}</span>
            </div>
            <div class="border-t pt-2 mt-2">
              <div class="flex justify-between font-bold">
                <span>Total</span>
                <span class="text-green-600">${{total.toFixed(2)}}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-between mt-8">
          <button type="button"
                  *ngIf="currentStep > 0"
                  (click)="previousStep()"
                  class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 
                         transition-colors duration-300">
            Back
          </button>
          <button type="button"
                  *ngIf="currentStep < steps.length - 1"
                  (click)="nextStep()"
                  [disabled]="!isStepValid()"
                  class="px-6 py-2 bg-green-600 text-white rounded-lg 
                         hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed 
                         transition-all duration-300 ml-auto">
            Continue
          </button>
          <button type="submit"
                  *ngIf="currentStep === steps.length - 1"
                  class="px-6 py-2 bg-green-600 text-white rounded-lg 
                         hover:bg-green-700 transform hover:scale-105 
                         transition-all duration-300 ml-auto">
            Place Order
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
