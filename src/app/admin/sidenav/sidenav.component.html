<aside
  class="relative h-screen flex flex-col bg-gray-950 border-r border-white/5 transition-all duration-300 ease-in-out select-none"
  [ngClass]="collapsed ? 'w-[68px]' : 'w-64'">

  <!-- Top glow accent -->
  <div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-cyan-500/60 to-transparent"></div>

  <!-- ── Brand ─────────────────────────────────────────── -->
  <div class="flex items-center gap-3 px-4 py-5 border-b border-white/5 overflow-hidden">
    <!-- Logo mark -->
    <div class="flex-shrink-0 w-9 h-9 rounded-xl bg-gradient-to-br from-cyan-500 to-cyan-700 flex items-center justify-center shadow-lg shadow-cyan-500/25">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>
    <div *ngIf="!collapsed" class="overflow-hidden">
      <p class="text-white font-semibold text-sm tracking-wide leading-tight whitespace-nowrap" style="font-family: 'DM Sans', sans-serif;">AdminPanel</p>
      <p class="text-gray-500 text-xs whitespace-nowrap">Management Suite</p>
    </div>
    <!-- Collapse toggle -->
    <button
      (click)="toggle()"
      class="ml-auto flex-shrink-0 w-7 h-7 rounded-lg text-gray-500 hover:text-white hover:bg-white/5 flex items-center justify-center transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform duration-300" [ngClass]="collapsed ? 'rotate-180' : ''" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
  </div>

  <!-- ── Nav Items ──────────────────────────────────────── -->
  <nav class="flex-1 py-4 px-2 space-y-0.5 overflow-y-auto overflow-x-hidden">
    <ng-container *ngFor="let item of navItems">
      <button
        (click)="goTo(item.id)"
        [title]="collapsed ? item.label : ''"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all duration-150 group relative"
        [ngClass]="activeSection === item.id
          ? 'bg-cyan-500/10 text-cyan-400 shadow-sm'
          : 'text-gray-400 hover:text-white hover:bg-white/5'">

        <!-- Active indicator bar -->
        <span *ngIf="activeSection === item.id"
          class="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 bg-cyan-400 rounded-r-full">
        </span>

        <!-- Icon -->
        <span class="flex-shrink-0" [innerHTML]="item.svg"></span>

        <!-- Label -->
        <span *ngIf="!collapsed" class="whitespace-nowrap overflow-hidden transition-all"
          style="font-family: 'DM Sans', sans-serif;">
          {{ item.label }}
        </span>

        <!-- Active dot badge when collapsed -->
        <span *ngIf="collapsed && activeSection === item.id"
          class="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-cyan-400">
        </span>
      </button>
    </ng-container>
  </nav>

  <!-- ── Bottom divider ─────────────────────────────────── -->
  <div class="px-2 pb-4 border-t border-white/5 pt-4 space-y-1">

    <!-- User card -->
    <div class="flex items-center gap-3 px-3 py-2 rounded-xl overflow-hidden"
         [ngClass]="collapsed ? 'justify-center' : ''">
      <div class="flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-purple-700 flex items-center justify-center text-white text-xs font-bold shadow">
        {{ initials }}
      </div>
      <div *ngIf="!collapsed" class="overflow-hidden flex-1">
        <p class="text-white text-sm font-medium truncate" style="font-family: 'DM Sans', sans-serif;">{{ username }}</p>
        <p class="text-gray-500 text-xs">Administrator</p>
      </div>
    </div>

    <!-- Logout button -->
    <button
      (click)="logout()"
      [title]="collapsed ? 'Logout' : ''"
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-500 hover:text-red-400 hover:bg-red-500/10 transition-all duration-150"
      [ngClass]="collapsed ? 'justify-center' : ''">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span *ngIf="!collapsed" style="font-family: 'DM Sans', sans-serif;">Logout</span>
    </button>
  </div>
</aside>
