spring.application.name=ApoGateway

server.port=8888
spring.cloud.gateway.discovery.locator.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
spring.main.allow-bean-definition-overriding=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/healthy-market-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=-http://localhost:9090/realms/healthy-market-realm/protocol/openid-connect/certs





