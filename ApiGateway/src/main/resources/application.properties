spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8889}
spring.application.name=ApoGateway
server.port=8888

eureka.client.serviceUrl.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

logging.level.org.springframework.cloud.config.client=DEBUG

springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Product Microservice
springdoc.swagger-ui.urls[0].url=/v3/api-docs/product
springdoc.swagger-ui.urls[1].name=Order Microservice
springdoc.swagger-ui.urls[1].url=/v3/api-docs/order
springdoc.swagger-ui.urls[2].name=Forum Microservice
springdoc.swagger-ui.urls[2].url=/v3/api-docs/forum
springdoc.swagger-ui.urls[3].name=Review & Report Microservice
springdoc.swagger-ui.urls[3].url=/v3/api-docs/reviewreport
springdoc.swagger-ui.urls[4].name=Diet Microservice
springdoc.swagger-ui.urls[4].url=/v3/api-docs/diet